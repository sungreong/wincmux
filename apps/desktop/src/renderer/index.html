<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WinCMux</title>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="appGrid" class="app-grid">
      <aside class="panel panel-left">
        <h2>Workspaces</h2>

        <div class="workspace-form">
          <input id="wsNameInput" placeholder="Workspace name" />
          <div class="path-row">
            <input id="wsPathInput" placeholder="C:\\project\\my-workspace" />
            <button id="pickFolderBtn">Browse</button>
          </div>
          <div class="workspace-actions">
            <button id="createWorkspaceBtn">Create</button>
            <button id="deleteWorkspaceBtn">Delete</button>
            <button id="openInVscodeBtn" class="icon-btn vscode-btn" title="Open selected workspace in VSCode" aria-label="Open selected workspace in VSCode">
              <span class="vscode-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <ul id="workspaceList"></ul>

        <div class="workspace-notepad">
          <div class="notepad-header">
            <span class="notepad-title">Notes</span>
            <span class="notepad-hint">per workspace · auto-saved</span>
          </div>
          <textarea id="workspaceNotepad" class="notepad-textarea" placeholder="메모 입력… (한글 OK)"></textarea>
        </div>
      </aside>

      <div id="leftResizeHandle" class="resize-handle" title="Resize left panel"></div>

      <main class="panel panel-center">
        <div class="toolbar">
          <button id="toggleWorkspacePanelBtn" class="toolbar-btn" title="Toggle workspace panel (Ctrl+B)">
            <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="1" y="2" width="14" height="12" rx="1.5"/>
              <line x1="5" y1="2" x2="5" y2="14"/>
            </svg>
            <span class="toolbar-btn-label">Workspaces</span>
          </button>
          <button id="toggleNotificationPanelBtn" class="toolbar-btn" title="Toggle notifications panel (Ctrl+Shift+N)">
            <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M8 2a5 5 0 0 1 5 5v3l1 2H2l1-2V7a5 5 0 0 1 5-5z"/>
              <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
            </svg>
            <span class="toolbar-btn-label">Notifications</span>
          </button>
          <button id="hiddenPanesBtn" class="toolbar-btn" title="Show hidden panes (Ctrl+Shift+H)">
            <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M1 8 C4 4 12 4 15 8"/>
              <line x1="2" y1="3" x2="14" y2="13"/>
            </svg>
            <span class="toolbar-btn-label">Hidden Panes (0)</span>
          </button>
          <button id="equalizePanesBtn" class="toolbar-btn" title="Reset all pane splits to equal size (Ctrl+Shift+E)">
            <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="1" y="2" width="14" height="12" rx="1.5"/>
              <line x1="6" y1="2" x2="6" y2="14"/>
              <line x1="11" y1="2" x2="11" y2="14"/>
            </svg>
            <span class="toolbar-btn-label">Equalize</span>
          </button>
          <div class="toolbar-divider"></div>
          <div class="font-scale-group" title="Global terminal font size">
            <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <text x="1" y="11" font-size="9" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="bold">A</text>
              <text x="9" y="14" font-size="6" font-family="sans-serif" stroke="none" fill="currentColor">a</text>
            </svg>
            <select id="fontScaleSelect" class="font-scale-select" title="Global terminal font size (Ctrl+= / Ctrl+-)">
              <option value="80">80%</option>
              <option value="85">85%</option>
              <option value="90">90%</option>
              <option value="95">95%</option>
              <option value="100" selected>100%</option>
              <option value="110">110%</option>
              <option value="120">120%</option>
            </select>
            <button id="fontScaleResetBtn" class="toolbar-btn font-scale-reset-btn" title="Reset font size to default (Ctrl+0)">
              <svg class="toolbar-btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 8A5 5 0 1 1 9 3.1"/>
                <polyline points="9,1 9,4 12,4"/>
              </svg>
            </button>
          </div>
          <span id="selectedPaneLabel" class="muted toolbar-pane-label">Selected Pane: -</span>
          <div id="hiddenPanesPopover" class="hidden-panes-popover"></div>
        </div>

        <div id="paneSurface" class="pane-surface"></div>
      </main>

      <div id="rightResizeHandle" class="resize-handle" title="Resize right panel"></div>

      <aside class="panel panel-right">
        <h2 id="notifTitle">Notifications (0 unread)</h2>
        <div class="notif-actions">
          <button id="refreshUnreadBtn">Refresh</button>
          <button id="markLatestReadBtn">Mark Latest</button>
          <button id="clearUnreadBtn">Clear</button>
        </div>
        <ul id="notificationList"></ul>
      </aside>
    </div>

    <div id="wsInfoOverlay" class="ws-info-overlay" style="display:none">
      <div id="wsInfoPanel" class="ws-info-panel">
        <div class="ws-info-header">
          <span id="wsInfoTitle" class="ws-info-title"></span>
          <button id="wsInfoCloseBtn" class="ws-info-close" title="Close">✕</button>
        </div>
        <div id="wsQuickActions" class="ws-quick-actions"></div>
        <textarea id="wsDescInput" class="ws-desc-input" placeholder="Description… (auto-saved)"></textarea>
        <div id="wsGitSummary" class="ws-git-summary" style="display:none"></div>
        <div id="wsSessionSummary" class="ws-session-summary"></div>
        <div id="wsScanArea" class="ws-scan-area" style="display:none"></div>
      </div>
    </div>

    <footer id="statusBar">Ready</footer>

    <script src="./vendor/xterm.js"></script>
    <script src="./vendor/addon-fit.js"></script>
    <script src="./vendor/addon-unicode11.js"></script>
    <script src="./renderer.shared.js"></script>
    <script src="./renderer.layout.js"></script>
    <script src="./renderer.panes.js"></script>
    <script src="./renderer.quickcmd.js"></script>
    <script src="./renderer.hidden.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
